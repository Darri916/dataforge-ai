services:
  - type: web
    name: dataforge-ai-backend
    rootDir: backend
    env: python
    buildCommand: pip install -r requirements-prod.txt && pip install sdv --no-deps
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port 8000
    envVars:
      - key: UPLOAD_DIR
        value: uploads
      - key: REPORT_DIR
        value: outputs
      - key: MAX_UPLOAD_SIZE_MB
        value: 50
      - key: DEFAULT_SYNTHESIZER
        value: gaussian_copula
      - key: RANDOM_SEED
        value: 42